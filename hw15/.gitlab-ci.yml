default:

stages: 
    - build
    - test

build_and_push_HW15:
    stage: build
    variables:
      # Clear this variable to completely stop Docker from starting via TLS
      DOCKER_TLS_CERTDIR: ""
      DOCKER_HOST: tcp://docker:2375
      DOCKER_TLS_VERIFY: ""
    image: 
        name: docker:29.5.2
        entrypoint: [""]
    services:
        - name: docker:29.5.2-dind
          alias: docker
    script: |
        # Wait a few brief moments for the sidecar dind daemon to fully spin up
        sleep 5 
        docker build -t jar:latest .
        docker tag jar:latest maks83/java:javalabv1
        docker run jar:latest test
        docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_TOKEN
        docker push maks83/java:javalabv1 
